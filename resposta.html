<head>
    <meta charset="UTF-8">
    <title>Exercício - Carros Elétricos</title>
</head>

<body>

    <h1>Carros Elétricos</h1>

    <form>
        <label for="nome">Nome completo:</label><br>
        <input type="text" id="nome" placeholder="Digite seu nome completo">

        <br><br>

        <label for="modelo">Modelo de carro elétrico favorito:</label><br>
        <input type="text" id="modelo" placeholder="Ex: Tesla Model 3">

        <br><br>

        <label for="senha">Crie uma senha de acesso:</label><br>
        <input type="password" id="senha" placeholder="Mínimo 6 caracteres">

        <br><br>

        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>

</body>
